syntax = "proto3";

package com.project.proto;

option java_package = "com.project.proto";
option java_outer_classname = "FilterRequestOuterClass";

// Regeneration command (run from java-project/src/main/java/com/project/proto):
// protoc --version  # expected: libprotoc 29.3 (protobuf 5.29.3)
// protoc --java_out=../../../ --cpp_out=../../../../../../../cpp-project/generated filter.proto

message FilterRequest {
  repeated string customers = 1;
  double minTotal = 2;
}